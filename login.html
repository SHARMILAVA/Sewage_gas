<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Underground Gas Monitoring System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="app.css">
</head>
<body class="login-page">
    <!-- Gas Leak Particle Canvas -->
    <canvas id="particleCanvas" class="particle-canvas"></canvas>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1>Underground Hazardous Gas<br>Monitoring System</h1>
                <p class="login-subtitle">Real-time IoT + AI Risk Monitoring Platform</p>
            </div>

            <form id="loginForm" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <div id="loginError" class="login-error" style="display:none;">
                    <i class="fas fa-exclamation-circle"></i> <span id="loginErrorText"></span>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="login-footer">
                <p>Default: <strong>admin@gasmonitor.com</strong> / <strong>admin123</strong></p>
            </div>
        </div>
    </div>

    <script>
        // Default users
        const USERS = [
            { email: 'admin@gasmonitor.com', password: 'admin123', name: 'Admin', role: 'Administrator' },
            { email: 'operator@gasmonitor.com', password: 'operator123', name: 'Operator', role: 'Field Operator' },
            { email: 'viewer@gasmonitor.com', password: 'viewer123', name: 'Viewer', role: 'Viewer' }
        ];

        // Initialize users in localStorage if not exists
        if (!localStorage.getItem('gasmonitor_users')) {
            localStorage.setItem('gasmonitor_users', JSON.stringify(USERS));
        }

        // Check if already logged in
        if (localStorage.getItem('gasmonitor_session')) {
            window.location.href = 'app.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const users = JSON.parse(localStorage.getItem('gasmonitor_users'));
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem('gasmonitor_session', JSON.stringify({
                    email: user.email,
                    name: user.name,
                    role: user.role,
                    loginTime: new Date().toISOString()
                }));
                window.location.href = 'app.html';
            } else {
                const errEl = document.getElementById('loginError');
                const errText = document.getElementById('loginErrorText');
                errText.textContent = 'Invalid email or password';
                errEl.style.display = 'flex';
                errEl.classList.add('shake');
                setTimeout(() => errEl.classList.remove('shake'), 500);
            }
        });

        // Background particle animation
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 3 + 1,
                speedX: (Math.random() - 0.5) * 0.5,
                speedY: -Math.random() * 0.5 - 0.2,
                opacity: Math.random() * 0.3 + 0.1
            });
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 217, 255, ${p.opacity})`;
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
                if (p.x < -10 || p.x > canvas.width + 10) { p.x = Math.random() * canvas.width; }
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
